<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#050D1A" />
    <title>Offline — KK CRM</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #050d1a;
        color: #f0f4ff;
        text-align: center;
        padding: 24px;
        padding-top: max(24px, env(safe-area-inset-top, 0px));
        padding-bottom: max(24px, env(safe-area-inset-bottom, 0px));
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #c9a84c;
        margin: 0 0 0.5rem;
      }
      p {
        margin: 0;
        font-size: 0.9rem;
        color: #8fa3bf;
        max-width: 20rem;
        line-height: 1.5;
      }
      a {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.6rem 1.25rem;
        border-radius: 0.5rem;
        background: linear-gradient(to bottom, #c9a84c, #8b6914);
        color: #0a0f1a;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <h1>Χωρίς σύνδεση</h1>
    <p>Ελέγξτε το Wi‑Fi ή το δίκτυο κινητής. Όταν επιστρέψει το σήμα, ανανεώστε τη σελίδα.</p>
    <a href="/">Επανάληψη</a>
  </body>
</html>
